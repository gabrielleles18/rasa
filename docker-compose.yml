services:
  rasa:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    volumes:
      - ./:/app
    environment:
      - RASA_LICENSE=${RASA_LICENSE}
    command: run --enable-api --cors "*"
    depends_on:
      - action-server
    networks:
      - nucleogov

  action-server:
    build:
      context: .
      dockerfile: Dockerfile.actions
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    networks:
      - nucleogov

networks:
  nucleogov:
    external: true
    name: nucleogov_default
