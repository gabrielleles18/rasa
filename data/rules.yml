version: "3.1"

rules:

- rule: Saudacao
  steps:
    - intent: saudacao
    - action: action_greet

- rule: Ativar formulario de manifestacao
  steps:
    - intent: registrar_manifestacao
    - action: manifestacao_form
    - active_loop: manifestacao_form

- rule: Enviar manifestacao ao finalizar formulario
  condition:
    - active_loop: manifestacao_form
  steps:
    - active_loop: null
    - action: action_enviar_manifestacao

- rule: Despedida
  steps:
    - intent: despedida
    - action: utter_despedida

- rule: Agradecimento ao usuario
  steps:
    - intent: agradecimento
    - action: utter_agradecimento

- rule: Finalizacao da conversa
  steps:
    - intent: finalizacao
    - action: utter_finalizacao

- rule: Fallback
  steps:
    - intent: nlu_fallback
    - action: utter_default
